[extend]
useDefault = true

# RAGNexus 项目自定义规则
[[rules]]
id = "ragnexus-api-key-pattern"
description = "检测 RAGNexus 可能的 API key 模式"
regex = '''(?:api[_-]?key|apikey|secret[_-]?key)\s*[:=]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
tags = ["api-key", "ragnexus"]

# 白名单：放行示例/测试中的假密钥
[allowlist]
description = "全局白名单"
paths = [
  '''\.env\.example$''',
  '''docs/.*''',
  '''tests/fixtures/.*''',
  '''\.pre-commit-config\.yaml$''',
]
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  '''driver://user:pass@localhost/dbname''',
]
